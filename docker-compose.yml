services:
  voice-email-app:
    build: .
    container_name: voice-email-app
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      DEBUG: "false"
      OAUTHLIB_INSECURE_TRANSPORT: "0"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - ./data:/app/data
      - ./static/audio:/app/static/audio
    restart: unless-stopped
